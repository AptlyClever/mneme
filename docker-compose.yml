name: mneme

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mneme-app
    restart: unless-stopped
    ports:
      - "0.0.0.0:8790:8790"
    environment:
      CTRL_ALT_APP_ID: mneme
      MNEME_VAULT_ROOT: /mnt/data/vault/mneme
      MNEME_MAX_UPLOAD_BYTES: ${MNEME_MAX_UPLOAD_BYTES:-26214400}
      # Write token for ingestion (create/update/delete/upload).
      # Open read API needs NO token; LAN read consumers (e.g. Bandit) must
      # NOT receive this value. Set via /mnt/temp/config/mneme/.env — never commit.
      MNEME_WRITE_TOKEN: ${MNEME_WRITE_TOKEN:-}
      # Axiom effective settings (chrome/branding only; Mneme is not the hub)
      AXIOM_BASE_URL: http://192.168.68.93:7895
      AXIOM_PUBLIC_BASE_URL: http://192.168.68.93:7895
    volumes:
      - /mnt/data/vault/mneme:/mnt/data/vault/mneme
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8790/api/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
